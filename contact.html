  <main>

    <!-- 联系页主体 -->
    <section class="contact-page" id="contact">

      <h1 class="contact-title">联系我</h1>

      <div class="contact-stack">

        <!-- 表单卡片 -->
        <div class="contact-card">
          <div class="contact-card__label">给我发送邮件</div>

          <!-- 你之后可以接 EmailJS / Formspree / 后端接口 -->
          <form class="contact-form" action="https://formspree.io/f/xbdrqkqb" method="POST">
            <div class="contact-form__row">
              <input class="contact-input"type="text"name="name"placeholder="你是谁？"required>
              <input class="contact-input" type="email" name="email" placeholder="你的邮箱" autocomplete="email" required>
            </div>

            <textarea class="contact-textarea"name="message"placeholder="你的需求"required></textarea>

            <input type="hidden" name="_subject" value="来自网站联系页的新消息">

            <!-- ✅ 发送按钮：复用首页「在这里找到我」的按钮样式 -->
            <button class="account-cta-button contact-send" type="submit">发送</button>
          </form>
        </div>

        <!-- 邮箱条 -->
        <div class="contact-strip">
          <div class="contact-strip__label">邮箱</div>
          <a class="contact-strip__value menu-link" href="mailto:dihanmilano@gmail.com">dihanmilano@gmail.com</a>
        </div>

        <!-- 6 个社媒方块 -->
        <div class="contact-grid">
          <a class="contact-tile" href="https://www.youtube.com/@GiovanepoliedricoHan" target="_blank" rel="noopener noreferrer">
            <img src="assets/icons/youtube.png" alt="YouTube">

          </a>

          <a class="contact-tile" href="https://www.instagram.com/dihan.mi" target="_blank" rel="noopener noreferrer">
